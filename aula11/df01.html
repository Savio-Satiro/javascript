<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidades</title>
</head>
<body>
    <h1>Nacionalidades</h1>
    De onde você é?<input type="text" name="pais" id="is" >
    <input type="button" value="Verificar" onclick="verify()">
    <div id="res">

    </div>
    <script>
        function verify(){
            var pais = document.getElementById('is').value.trim()
            var res = document.getElementById('res')
            res.innerText = `Você é do ${pais}!`
            if (pais.toLowerCase() === 'brasil') {
                res.innerHTML += `<p>Você é <strong>Brasileiro</strong>!</p>`
            } else {
                res.innerHTML += `<p>Você é <strong>Estrangeiro</strong>!</p>`
            }
        }
    </script>
</body>
</html>
